<style>
:root {
  --bg: #050a18;
  --card: #0d1428;
  --accent: #f9c800;
  --text: #e0e6ed;
  --text-dim: rgba(224, 230, 237, 0.6);
}

* { margin:0; padding:0; box-sizing:border-box; }
body { 
  font-family: 'Inter', sans-serif; 
  background: var(--bg); 
  color: var(--text); 
  line-height: 1.6; 
  overflow-x: hidden;
}

/* Navigazione */
nav {
  position: fixed; top: 0; width: 100%; z-index: 1000;
  padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center;
  background: rgba(5, 10, 24, 0.85); backdrop-filter: blur(12px);
  border-bottom: 1px solid rgba(255,255,255,0.05);
}
.logo { font-weight: 800; font-size: 1.1rem; color: var(--accent); text-transform: uppercase; letter-spacing: 1px; }

/* Hero Section con Effetto Gocce */
.hero {
  padding: 180px 5% 120px; text-align: center; position: relative;
  background: radial-gradient(circle at top, #102e7a 0%, #050a18 80%);
  overflow: hidden;
  min-height: 80vh;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
}
.hero-content { position: relative; z-index: 10; pointer-events: none; }
.hero-content h1 { font-size: clamp(2.3rem, 5.5vw, 3.8rem); font-weight: 800; margin-bottom: 1.5rem; line-height: 1.1; color: #fff; }
.hero-content p { max-width: 700px; margin: 0 auto 2.5rem; color: rgba(255,255,255,0.8); font-size: 1.15rem; }

/* Pulsanti (Stato Disabilitato) */
.btn { 
  display: inline-block; background: var(--accent); color: #000; 
  padding: 1rem 2.5rem; border-radius: 6px; font-weight: 700; 
  text-decoration: none; transition: 0.3s; border: none; font-size: 1rem;
  pointer-events: auto;
}
.btn-disabled { background: #333; color: #777; cursor: not-allowed; opacity: 0.7; }

/* --- ENGINE GOCCE D'ACQUA --- */
#drop-container {
  position: absolute; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 1; pointer-events: none;
}
.water-drop {
  position: absolute;
  background: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
  border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
  animation: fall linear infinite;
}
@keyframes fall {
  0% { transform: translateY(-100px); opacity: 0; }
  10% { opacity: 0.6; }
  90% { opacity: 0.4; }
  100% { transform: translateY(110vh); opacity: 0; }
}

/* Sezioni */
.section { padding: 100px 5%; max-width: 1100px; margin: 0 auto; }
h2 { font-size: 2.3rem; margin-bottom: 3.5rem; text-align: center; font-weight: 800; }

/* Blocco 1: Problemi */
.grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 2.5rem; }
.card { background: var(--card); padding: 2.5rem; border-radius: 12px; border: 1px solid rgba(255,255,255,0.04); }
.card h3 { color: var(--accent); margin-bottom: 1.2rem; font-size: 1.5rem; }
.list-error { list-style: none; color: var(--text-dim); }
.list-error li { margin-bottom: 0.9rem; padding-left: 28px; position: relative; }
.list-error li::before { content: "✕"; position: absolute; left: 0; color: #ff5f5f; font-weight: bold; }

.diag-item { border-left: 3px solid var(--accent); padding-left: 20px; margin-bottom: 20px; }
